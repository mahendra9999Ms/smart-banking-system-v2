{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ASB Smart Banking</title>
<!-- Google Fonts — Playfair Display + DM Sans (same as previous version) -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
:root{
  --navy:#0B1629;--navy2:#111E35;--navy3:#172540;
  --gold:#C9A84C;--gold2:#E8C46A;
  --teal:#19B8A0;--red:#E05252;--orange:#E67E22;
  --text:#E8EDF5;--muted:#7A8BAA;
  --border:rgba(201,168,76,.18);
  --card:rgba(17,30,53,.96);
  --radius:14px;--shadow:0 8px 32px rgba(0,0,0,.35);
}
*{box-sizing:border-box;}

/* ── Typography ───────────────────────────────────────── */
body{
  background:var(--navy);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  font-size:15px;
  min-height:100vh;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(201,168,76,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(201,168,76,.03) 1px,transparent 1px);
  background-size:48px 48px;
  pointer-events:none;z-index:0;
}
h1,h2,h3,h4,h5,.brand,.page-title,.balance-num{
  font-family:'Playfair Display',serif;
}

/* ── Navbar ───────────────────────────────────────────── */
.asb-nav{
  background:rgba(5,14,28,.97);
  border-bottom:1px solid var(--border);
  padding:0 1.5rem;height:60px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:1000;
  backdrop-filter:blur(12px);
}
.asb-nav .brand{
  color:var(--gold);font-weight:700;font-size:1.25rem;
  text-decoration:none;letter-spacing:-.3px;
  font-family:'Playfair Display',serif;
}
.asb-nav .brand span{color:var(--text);}
.nav-links a{
  color:var(--muted);text-decoration:none;font-size:.83rem;
  padding:5px 11px;border-radius:7px;transition:.18s;
  display:inline-flex;align-items:center;gap:5px;
  font-family:'DM Sans',sans-serif;font-weight:500;
}
.nav-links a:hover{color:var(--text);background:rgba(255,255,255,.06);}

/* ── Layout ───────────────────────────────────────────── */
.page-wrap{max-width:1160px;margin:0 auto;padding:28px 20px;position:relative;z-index:1;}

/* ── Cards ────────────────────────────────────────────── */
.asb-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:22px;
  transition:.2s;
}
.asb-card:hover{box-shadow:var(--shadow);}

/* ── Inputs ───────────────────────────────────────────── */
.asb-label{
  font-size:.7rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.1em;color:var(--muted);display:block;margin-bottom:6px;
  font-family:'DM Sans',sans-serif;
}
.asb-input{
  width:100%;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.1);border-radius:9px;
  color:var(--text);padding:10px 14px;font-size:.9rem;
  outline:none;transition:.2s;font-family:'DM Sans',sans-serif;
}
.asb-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.12);}
.asb-input option{background:var(--navy2);}

/* ── Buttons ──────────────────────────────────────────── */
.btn-gold{
  background:linear-gradient(135deg,#C9A84C,#E8C46A);
  color:#0B1629;font-weight:700;border:none;
  padding:10px 22px;border-radius:9px;font-size:.875rem;
  cursor:pointer;transition:.2s;
  display:inline-flex;align-items:center;gap:6px;text-decoration:none;
  font-family:'DM Sans',sans-serif;
}
.btn-gold:hover{opacity:.88;color:#0B1629;}
.btn-outline{
  background:transparent;border:1px solid var(--border);
  color:var(--muted);padding:9px 18px;border-radius:9px;
  font-size:.875rem;cursor:pointer;transition:.2s;
  text-decoration:none;display:inline-flex;align-items:center;gap:6px;
  font-family:'DM Sans',sans-serif;
}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);}
.btn-danger{
  background:rgba(224,82,82,.15);border:1px solid rgba(224,82,82,.35);
  color:var(--red);padding:8px 16px;border-radius:8px;font-size:.82rem;
  cursor:pointer;text-decoration:none;
  display:inline-flex;align-items:center;gap:5px;transition:.2s;
  font-family:'DM Sans',sans-serif;
}
.btn-danger:hover{background:rgba(224,82,82,.25);}

/* ── Badges ───────────────────────────────────────────── */
.bdg{padding:2px 9px;border-radius:20px;font-size:.7rem;font-weight:700;display:inline-block;}
.bdg-low   {background:rgba(25,184,160,.12);color:var(--teal);  border:1px solid rgba(25,184,160,.3);}
.bdg-med   {background:rgba(230,126,34,.12);color:var(--orange);border:1px solid rgba(230,126,34,.3);}
.bdg-high  {background:rgba(224,82,82,.12); color:var(--red);   border:1px solid rgba(224,82,82,.3);}
.bdg-ok    {background:rgba(25,184,160,.12);color:var(--teal);  border:1px solid rgba(25,184,160,.3);}
.bdg-warn  {background:rgba(230,126,34,.12);color:var(--orange);border:1px solid rgba(230,126,34,.3);}
.bdg-danger{background:rgba(224,82,82,.12); color:var(--red);   border:1px solid rgba(224,82,82,.3);}
.bdg-pending{background:rgba(201,168,76,.12);color:var(--gold); border:1px solid var(--border);}

/* ── Alert boxes ──────────────────────────────────────── */
.abox{border-radius:10px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:flex-start;gap:10px;font-size:.86rem;}
.abox.info   {background:rgba(201,168,76,.07);border:1px solid var(--border);        color:var(--gold);}
.abox.success{background:rgba(25,184,160,.07);border:1px solid rgba(25,184,160,.3);  color:var(--teal);}
.abox.warning{background:rgba(230,126,34,.07);border:1px solid rgba(230,126,34,.3);  color:var(--orange);}
.abox.danger {background:rgba(224,82,82,.07); border:1px solid rgba(224,82,82,.3);   color:var(--red);}

/* ── Tables ───────────────────────────────────────────── */
.asb-table{width:100%;border-collapse:collapse;}
.asb-table th{
  font-size:.68rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;color:var(--muted);
  padding:9px 13px;border-bottom:1px solid var(--border);
  background:rgba(255,255,255,.02);font-family:'DM Sans',sans-serif;
}
.asb-table td{padding:11px 13px;font-size:.875rem;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle;}
.asb-table tr:hover td{background:rgba(255,255,255,.02);}

/* ── Stat icons ───────────────────────────────────────── */
.si{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.15rem;margin-bottom:10px;}
.si-gold  {background:rgba(201,168,76,.12);color:var(--gold);}
.si-teal  {background:rgba(25,184,160,.12);color:var(--teal);}
.si-red   {background:rgba(224,82,82,.12); color:var(--red);}
.si-blue  {background:rgba(99,179,237,.12);color:#63B3ED;}
.si-orange{background:rgba(230,126,34,.12);color:var(--orange);}

/* ── Page title ───────────────────────────────────────── */
.page-title{
  font-size:1.4rem;font-weight:700;color:var(--text);
  margin-bottom:20px;display:flex;align-items:center;gap:10px;
  font-family:'Playfair Display',serif;
}
.pill{
  background:rgba(201,168,76,.1);border:1px solid var(--border);
  border-radius:8px;padding:4px 10px;font-size:.95rem;
}

/* ── Pagination ───────────────────────────────────────── */
.pag{display:flex;gap:5px;justify-content:center;margin-top:18px;}
.pag a,.pag span{padding:5px 11px;border-radius:7px;font-size:.78rem;border:1px solid var(--border);color:var(--muted);text-decoration:none;transition:.15s;}
.pag a:hover{border-color:var(--gold);color:var(--gold);}
.pag span.current{background:rgba(201,168,76,.12);color:var(--gold);border-color:var(--gold);}

/* ── Divider ──────────────────────────────────────────── */
.asb-hr{height:1px;background:var(--border);margin:18px 0;}

/* ── Animations ───────────────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
.fu {animation:fadeUp .35s ease both;}
.fu1{animation-delay:.05s;} .fu2{animation-delay:.10s;}
.fu3{animation-delay:.15s;} .fu4{animation-delay:.20s;}

/* ── Dropdown ─────────────────────────────────────────── */
.nav-drop-wrap{position:relative;}
.nav-drop-btn{
  cursor:pointer;display:flex;align-items:center;gap:7px;
  background:rgba(201,168,76,.08);border:1px solid var(--border);
  padding:5px 13px;border-radius:28px;font-size:.82rem;
  color:var(--gold);user-select:none;font-family:'DM Sans',sans-serif;
}
.nav-drop-menu{
  display:none;position:absolute;top:calc(100% + 8px);right:0;
  background:var(--navy2);border:1px solid var(--border);
  border-radius:12px;min-width:180px;
  box-shadow:0 8px 32px rgba(0,0,0,.4);overflow:hidden;z-index:9999;
}
.nav-drop-menu a{
  display:flex;align-items:center;gap:9px;
  padding:10px 15px;color:var(--text);text-decoration:none;
  font-size:.84rem;transition:.15s;font-family:'DM Sans',sans-serif;
}
.nav-drop-menu a:hover{background:rgba(255,255,255,.05);}
.nav-drop-menu a.danger{color:var(--red);}
.nav-sep{height:1px;background:var(--border);}
</style>
</head>
<body>
{% if user.is_authenticated %}
  {% if user.is_staff %}{% include "admin/navbar.html" %}{% else %}{% include "user/navbar.html" %}{% endif %}
{% endif %}
<div class="page-wrap">
{% if messages %}{% for m in messages %}
<div class="abox {% if m.tags == 'error' %}danger{% elif m.tags == 'warning' %}warning{% elif m.tags == 'success' %}success{% else %}info{% endif %}">
  <i class="bi bi-info-circle"></i>{{ m }}
</div>{% endfor %}{% endif %}
{% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Dropdown toggle
document.addEventListener('click', function(e) {
  document.querySelectorAll('.nav-drop-menu').forEach(function(m) {
    if (!m.previousElementSibling.contains(e.target)) m.style.display = 'none';
  });
});
document.querySelectorAll('.nav-drop-btn').forEach(function(btn) {
  btn.addEventListener('click', function(e) {
    e.stopPropagation();
    var menu = btn.nextElementSibling;
    menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
  });
});
</script>
</body></html>
